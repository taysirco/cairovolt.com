<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b"/>
      <stop offset="100%" style="stop-color:#09090b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="url(#bgGrad)" stroke="#27272a" stroke-width="2"/>
  <!-- Shield -->
  <g filter="url(#glow)" transform="translate(64,60) scale(1.8)">
    <path d="M0,-22 L18,-14 L18,4 C18,16 0,24 0,24 C0,24 -18,16 -18,4 L-18,-14 Z" 
          fill="url(#shieldGrad)" opacity="0.95"/>
  </g>
  <!-- Checkmark -->
  <polyline points="50,64 60,74 78,54" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Lightning bolt -->
  <g transform="translate(64,104)">
    <path d="M-4,-8 L1,-1 L-2,-1 L3,8 L-1,1 L2,1 Z" fill="#fbbf24" opacity="0.9"/>
  </g>
</svg>
