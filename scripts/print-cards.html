<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>CairoVolt — Print Verification Cards (A4)</title>
    <style>
        /* ═══════════════════════════════════════
         * CairoVolt C2PA Card Print Sheet
         * Prints 10 credit-card-sized (85.6 × 53.98mm) cards 
         * arranged in 2 columns × 5 rows on A4 paper.
         * Features crop marks, bleed, and embeddable QR.
         *
         * Usage: Open in Chrome → Print → "Save as PDF"
         * Paper: A4, margins: None, scale: 100%
         * ═══════════════════════════════════════ */
        
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Outfit:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        @page {
            size: A4 portrait;
            margin: 10mm;
        }

        body {
            font-family: 'Cairo', 'Outfit', system-ui, sans-serif;
            background: #fff;
            color: #000;
        }

        .page {
            width: 210mm;
            height: 297mm;
            padding: 15mm 20mm;
            display: flex;
            flex-wrap: wrap;
            gap: 4mm;
            justify-content: center;
            align-content: flex-start;
            page-break-after: always;
            position: relative;
        }

        .card {
            width: 85.6mm;
            height: 53.98mm;
            background: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 100%);
            border-radius: 3mm;
            padding: 4mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            color: #fafafa;
            /* Gold border */
            border: 0.3mm solid #b8860b;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 1.5mm;
            left: 1.5mm;
            right: 1.5mm;
            bottom: 1.5mm;
            border: 0.15mm solid rgba(184, 134, 11, 0.3);
            border-radius: 2mm;
            pointer-events: none;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 2mm;
            width: 100%;
        }

        .logo-icon {
            width: 5mm;
            height: 5mm;
            fill: #d4a017;
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-size: 10pt;
            font-weight: 700;
            color: #d4a017;
            letter-spacing: 0.5mm;
        }

        .subtitle {
            font-family: 'Outfit', sans-serif;
            font-size: 5pt;
            color: #b8860b;
            letter-spacing: 1mm;
            text-transform: uppercase;
            margin-top: 0.5mm;
            text-align: center;
            width: 100%;
        }

        .qr-container {
            position: relative;
            width: 22mm;
            height: 22mm;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-container::before,
        .qr-container::after {
            content: '';
            position: absolute;
            width: 4mm;
            height: 4mm;
            border: 0.3mm solid #d4a017;
        }

        .qr-container::before {
            top: -1mm;
            left: -1mm;
            border-right: none;
            border-bottom: none;
        }

        .qr-container::after {
            bottom: -1mm;
            right: -1mm;
            border-left: none;
            border-top: none;
        }

        .qr-placeholder {
            width: 20mm;
            height: 20mm;
            background: #fff;
            border-radius: 1mm;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6pt;
            color: #888;
            font-family: 'Outfit', monospace;
        }

        .serial-code {
            font-family: 'Outfit', monospace;
            font-size: 6.5pt;
            color: #d4a017;
            letter-spacing: 0.5mm;
            text-align: center;
        }

        .scan-text {
            font-size: 5pt;
            color: #a1a1aa;
            text-align: center;
            line-height: 1.4;
        }

        .scan-text strong {
            color: #fafafa;
        }

        .footer-text {
            font-size: 4pt;
            color: #71717a;
            text-align: center;
            direction: ltr;
        }

        .footer-text span.ar {
            direction: rtl;
            unicode-bidi: bidi-override;
        }

        /* Crop marks */
        .crop-mark {
            position: absolute;
            width: 3mm;
            height: 0.1mm;
            background: #ccc;
        }

        .crop-mark.v {
            width: 0.1mm;
            height: 3mm;
        }

        /* Print-specific */
        @media print {
            body { background: #fff; }
            .page { padding: 12mm 18mm; }
            .no-print { display: none; }
        }

        /* ─── Config Panel (screen only) ─── */
        .config-panel {
            background: #18181b;
            color: #fafafa;
            padding: 20px 30px;
            margin: 20px auto;
            max-width: 700px;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
        }

        .config-panel h1 {
            color: #d4a017;
            margin-bottom: 16px;
            font-size: 22px;
        }

        .config-panel label {
            display: block;
            margin: 10px 0 4px;
            font-size: 13px;
            color: #a1a1aa;
        }

        .config-panel input,
        .config-panel textarea {
            width: 100%;
            padding: 10px 14px;
            background: #27272a;
            border: 1px solid #3f3f46;
            border-radius: 8px;
            color: #fafafa;
            font-family: 'Outfit', monospace;
            font-size: 13px;
        }

        .config-panel button {
            margin-top: 16px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #92400e, #d97706);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
        }

        .config-panel button:hover { opacity: 0.9; }

        .config-panel .hint {
            font-size: 11px;
            color: #71717a;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<!-- ═══════════════════════════════════════
     Configuration Panel (screen-only)
     ═══════════════════════════════════════ -->
<div class="config-panel no-print" id="config">
    <h1>⚡ CairoVolt — مُولّد كروت التحقق</h1>
    <p style="color: #a1a1aa; margin-bottom: 16px; font-size: 13px;">
        أدخل السيريالات وروابط QR ثم اضغط "توليد الكروت" لإنشاء صفحة جاهزة للطباعة.
    </p>

    <label>السيريالات وروابط QR (سيريال واحد + رابط في كل سطر)</label>
    <textarea id="serialsInput" rows="12" placeholder="CV-1A7K2Mm313 https://cairovolt.com/verify?s=CV-1A7K2Mm313&utm_source=package&utm_medium=qr&utm_campaign=c2pa
CV-19NP3Km313 https://cairovolt.com/verify?s=CV-19NP3Km313&utm_source=package&utm_medium=qr&utm_campaign=c2pa"></textarea>
    <p class="hint">كل سطر: SERIAL_CODE SPACE QR_URL (مفصولين بمسافة). الصيغة: CV-1xxxxxm313. يمكن أيضاً إدخال السيريال فقط.</p>

    <button onclick="generateCards()">🖨️ توليد الكروت للطباعة</button>
</div>

<!-- ═══════════════════════════════════════
     Print Sheet Container
     ═══════════════════════════════════════ -->
<div id="printArea"></div>

<script>
    /**
     * Parse input and generate print-ready card sheets
     */
    function generateCards() {
        const raw = document.getElementById('serialsInput').value.trim();
        if (!raw) { alert('أدخل السيريالات أولاً!'); return; }

        const lines = raw.split('\n').filter(l => l.trim());
        const cards = lines.map(line => {
            const parts = line.trim().split(/\s+/);
            const serial = parts[0] || '';
            const url = parts[1] || `https://cairovolt.com/verify?s=${serial}&utm_source=package&utm_medium=qr&utm_campaign=c2pa`;
            return { serial, url };
        });

        // Group cards into pages (10 per page: 2 cols × 5 rows)
        const cardsPerPage = 10;
        const pages = [];
        for (let i = 0; i < cards.length; i += cardsPerPage) {
            pages.push(cards.slice(i, i + cardsPerPage));
        }

        let html = '';
        pages.forEach(pageCards => {
            html += '<div class="page">';
            pageCards.forEach(card => {
                html += `
                <div class="card">
                    <div class="card-header">
                        <svg class="logo-icon" viewBox="0 0 24 24">
                            <path d="M13 3L4 14h7l-2 7 9-11h-7l2-7z"/>
                        </svg>
                        <span class="brand-name">CairoVolt</span>
                    </div>
                    <div class="subtitle">C2PA PRODUCT AUTHENTICATION</div>

                    <div class="qr-container">
                        <div class="qr-placeholder">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(card.url)}&color=000000&bgcolor=ffffff&margin=1" 
                                 alt="QR ${card.serial}" 
                                 style="width: 20mm; height: 20mm; border-radius: 1mm;" 
                                 crossorigin="anonymous" />
                        </div>
                    </div>

                    <div class="serial-code">Serial: ${card.serial}</div>
                    <div class="scan-text"><strong>Scan to Verify</strong> & Activate Warranty</div>
                    <div class="footer-text">cairovolt.com | <span class="ar">الضمان الذهبي</span></div>
                </div>`;
            });
            html += '</div>';
        });

        document.getElementById('printArea').innerHTML = html;
        // Auto-trigger print
        setTimeout(() => window.print(), 800);
    }
</script>

</body>
</html>
