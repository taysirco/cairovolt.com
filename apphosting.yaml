runConfig:
  cpu: 1
  memoryMiB: 2048
  minInstances: 0
  maxInstances: 4
  concurrency: 50

env:
  - variable: NODE_OPTIONS
    value: --max-old-space-size=4096
    availability:
      - BUILD

  - variable: FIREBASE_PROJECT_ID
    value: gadgets-b0bdb

  - variable: FIREBASE_DATABASE_ID
    value: gadgets

  - variable: GOOGLE_SHEET_ID
    value: 1laNmzAhUHJpkm-DTqzn0fsZxZNZ7S-Du2-_m7WFDYc8
    availability:
      - RUNTIME

  # ⭐ تسجيل دخول جوجل لتقييمات صفحات المنتجات (Google Identity Services) —
  #    معرّف عميل OAuth عام بطبيعته (يظهر في الصفحة)، BUILD لأن NEXT_PUBLIC يُدمج وقت البناء.
  # 🔵 تسجيل دخول فيسبوك للتقييمات (تطبيق CairoVolt Login) — App ID عام بطبيعته.
  - variable: NEXT_PUBLIC_FB_APP_ID
    value: "3063510427184443"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_GOOGLE_CLIENT_ID
    value: 898767728147-0g8lb16hfkcipnqh3v36fs5ft98p4p2j.apps.googleusercontent.com
    availability:
      - BUILD
      - RUNTIME

  - variable: CRM_WEBHOOK_URL
    value: https://crm--my-crm-bfac7.asia-southeast1.hosted.app/api/webhook/new-lead
    availability:
      - RUNTIME

  - variable: ADMIN_TASKS_SECRET
    secret: admin_tasks_secret
    availability:
      - RUNTIME

  - variable: ADMIN_SESSION_SECRET
    secret: admin_session_secret
    availability:
      - RUNTIME

  - variable: REVIEW_WEBHOOK_SECRET
    secret: review_webhook_secret
    availability:
      - RUNTIME

  - variable: INDEXING_WEBHOOK_SECRET
    secret: indexing_webhook_secret
    availability:
      - RUNTIME

  - variable: GOOGLE_SERVICE_ACCOUNT_EMAIL
    secret: google_service_account_email
    availability:
      - RUNTIME

  - variable: GOOGLE_PRIVATE_KEY
    secret: google_private_key
    availability:
      - RUNTIME

  - variable: CAIROVOLT_API_KEY
    secret: cairovolt_api_key
    availability:
      - RUNTIME

  - variable: TIKTOK_ACCESS_TOKEN
    secret: tiktok_access_token
    availability:
      - RUNTIME

  - variable: CRM_WEBHOOK_SECRET
    secret: crm_webhook_secret
    availability:
      - RUNTIME
